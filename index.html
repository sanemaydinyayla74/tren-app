<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tren — Turkish, piece by piece</title>
<meta name="description" content="Learn Turkish by building word trains. Free, fun, no signup. From root to suffixes — piece by piece.">
<meta name="theme-color" content="#d97742">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tren">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf6ef;
    --bg-alt: #f2ebe0;
    --panel: #ffffff;
    --ink: #2a1f1a;
    --muted: #8a7e72;
    --line: #d9cfc0;

    /* Renkler - Türk estetik */
    --root: #d97742;       /* toprak turuncu - lokomotif */
    --plural: #a8324c;     /* bordo - çoğul */
    --poss: #3a7ca5;       /* çini mavisi - iyelik */
    --case: #7a9244;       /* zeytin yeşili - hâl */
    --gold: #b8853a;       /* bakır - vurgu */

    --shadow: 0 3px 0 rgba(42,31,26,0.18);
    --shadow-deep: 0 5px 0 rgba(42,31,26,0.22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    user-select: none;
    overflow-x: hidden;
  }

  /* Arka plan dokusu - hafif Türk kilim hissi */
  body {
    background:
      radial-gradient(circle at 15% 20%, rgba(168,50,76,0.04), transparent 35%),
      radial-gradient(circle at 85% 75%, rgba(58,124,165,0.04), transparent 35%),
      radial-gradient(circle at 50% 50%, rgba(122,146,68,0.03), transparent 40%),
      var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px;
  }

  .container {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--root); }
  .header-stats {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .sound-toggle {
    background: transparent;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.15s, transform 0.1s;
  }
  .sound-toggle:hover { opacity: 1; }
  .sound-toggle:active { transform: scale(0.9); }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    font-weight: 700;
  }
  .stat-item.hearts { color: var(--plural); }
  .stat-item.streak { color: var(--gold); }
  .stat-item.score { color: var(--ink); }

  /* Hedef paneli */
  .goal-panel {
    background: var(--panel);
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .goal-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .goal-text {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    font-style: italic;
    color: var(--ink);
    line-height: 1.3;
  }
  .goal-text .emoji {
    font-style: normal;
    margin-right: 6px;
  }

  /* "Building" paneli - şu an inşa edilen */
  .building-panel {
    background: var(--bg-alt);
    border: 2px dashed var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    text-align: center;
    transition: all 0.3s;
  }
  .building-panel.complete {
    background: rgba(122,146,68,0.12);
    border-style: solid;
    border-color: var(--case);
    animation: completePulse 0.6s ease-out;
  }
  @keyframes completePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .building-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .building-word {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.3px;
  }
  .building-word .root-part { color: var(--root); }
  .building-word .plural-part { color: var(--plural); }
  .building-word .poss-part { color: var(--poss); }
  .building-word .case-part { color: var(--case); }
  .building-panel.complete .building-word {
    color: var(--case);
  }

  /* Hint badge */
  .hint-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--bg);
    padding: 8px 14px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    box-shadow: var(--shadow);
    margin: 0 auto;
    align-self: center;
  }
  .hint-badge .role-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .hint-badge.plural .role-dot { background: var(--plural); }
  .hint-badge.poss .role-dot { background: var(--poss); }
  .hint-badge.case .role-dot { background: var(--case); }
  .hint-badge.plural { background: var(--plural); }
  .hint-badge.poss { background: var(--poss); }
  .hint-badge.case { background: var(--case); }
  .hint-badge.complete {
    background: var(--case);
    color: white;
  }

  /* Tren */
  .train-section {
    background: var(--panel);
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    padding: 24px 16px 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .rail-track {
    position: absolute;
    bottom: 28px;
    left: 0;
    right: 0;
    height: 8px;
    background:
      repeating-linear-gradient(
        90deg,
        var(--ink) 0,
        var(--ink) 2px,
        transparent 2px,
        transparent 10px
      );
    opacity: 0.4;
  }
  .rail-track::after {
    content: '';
    position: absolute;
    bottom: 8px;
    left: 0; right: 0;
    height: 2px;
    background: var(--ink);
    opacity: 0.3;
  }
  .train {
    display: flex;
    align-items: flex-end;
    gap: 0;
    min-height: 100px;
    position: relative;
    z-index: 2;
  }

  .train-car {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .car-body {
    border: 2.5px solid var(--ink);
    border-radius: 10px;
    padding: 12px 14px;
    min-width: 60px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
  }
  .car-body .text {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    color: white;
    line-height: 1;
  }
  .car-body.locomotive {
    background: var(--root);
    border-radius: 10px 18px 10px 10px;
    padding-left: 16px;
    padding-right: 18px;
  }
  .car-body.locomotive::before {
    content: '';
    position: absolute;
    top: -12px;
    right: 8px;
    width: 8px;
    height: 12px;
    background: var(--ink);
    border-radius: 2px 2px 0 0;
  }
  .car-body.locomotive::after {
    content: '☁';
    position: absolute;
    top: -24px;
    right: 2px;
    font-size: 14px;
    color: var(--muted);
    opacity: 0.7;
  }
  .car-body.suffix.plural { background: var(--plural); }
  .car-body.suffix.poss { background: var(--poss); }
  .car-body.suffix.case { background: var(--case); }

  /* Yumuşama (soft consonant) */
  .softening-badge {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 100px;
    border: 1.5px solid var(--ink);
    letter-spacing: 0.5px;
    white-space: nowrap;
    box-shadow: 0 2px 0 rgba(42,31,26,0.2);
  }
  .train-car.softened .car-body.locomotive {
    animation: softeningPop 0.7s cubic-bezier(.34,1.56,.64,1);
  }
  .train-car.softened .softening-badge {
    animation: softBadgeIn 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes softeningPop {
    0% { transform: scale(1); }
    30% { transform: scale(1.15); filter: brightness(1.3); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  @keyframes softBadgeIn {
    0% { transform: translateX(-50%) translateY(10px) scale(0); opacity: 0; }
    60% { transform: translateX(-50%) translateY(0) scale(1.2); opacity: 1; }
    100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
  }
  /* Sparkle - yumuşama parıltısı */
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 18px;
    animation: sparkleFloat 0.9s ease-out forwards;
    z-index: 10;
  }
  @keyframes sparkleFloat {
    0% { transform: translate(0, 0) scale(0); opacity: 0; }
    30% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 1; }
    100% { transform: translate(calc(var(--dx) * 1.5), calc(var(--dy) * 1.5 - 20px)) scale(0); opacity: 0; }
  }

  .wheels {
    display: flex;
    gap: 14px;
    margin-top: 4px;
    padding: 0 8px;
  }
  .wheel {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--bg);
    box-shadow: 0 1px 0 rgba(0,0,0,0.2);
  }
  .train-car .coupler {
    position: absolute;
    right: -6px;
    bottom: 16px;
    width: 6px;
    height: 3px;
    background: var(--ink);
    z-index: 1;
  }
  .train-car:last-child .coupler { display: none; }

  /* Vagon ekleme animasyonu */
  .train-car.entering {
    animation: chooChoo 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes chooChoo {
    0% { transform: translateX(-50px) scale(0.8); opacity: 0; }
    60% { transform: translateX(4px) scale(1.05); opacity: 1; }
    100% { transform: translateX(0) scale(1); opacity: 1; }
  }

  /* Yanlış sallama */
  .train.shake {
    animation: shake 0.4s ease-in-out;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(-8px) rotate(-1deg); }
    40% { transform: translateX(8px) rotate(1deg); }
    60% { transform: translateX(-6px) rotate(-0.5deg); }
    80% { transform: translateX(6px) rotate(0.5deg); }
  }

  /* Seçenekler */
  .options-panel {
    background: var(--panel);
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .options-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 12px;
  }
  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 10px;
  }
  .option-btn {
    background: var(--bg-alt);
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    padding: 14px 8px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.1s;
    color: var(--ink);
    position: relative;
  }
  .option-btn:active {
    transform: translateY(3px);
    box-shadow: none;
  }
  .option-btn.wrong-flash {
    background: var(--plural);
    color: white;
    animation: wrongFlash 0.4s;
  }
  @keyframes wrongFlash {
    0%, 100% { background: var(--plural); color: white; }
    50% { background: var(--bg-alt); color: var(--ink); }
  }
  .option-btn.used {
    opacity: 0.3;
    pointer-events: none;
  }
  .option-btn .role-tag {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--ink);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 8px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 100px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(42,31,26,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
    backdrop-filter: blur(8px);
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--bg);
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 32px 26px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 8px 0 rgba(42,31,26,0.4);
  }
  .modal-emoji {
    font-size: 56px;
    margin-bottom: 12px;
  }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .modal-title .accent { color: var(--root); }
  .modal-subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 22px;
    line-height: 1.5;
  }

  /* Breakdown - kelime parçaları */
  .breakdown {
    background: var(--panel);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 14px;
    margin: 18px 0;
    text-align: left;
  }
  .breakdown-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-chip {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    color: white;
    min-width: 50px;
    text-align: center;
    flex-shrink: 0;
  }
  .breakdown-chip.root { background: var(--root); }
  .breakdown-chip.plural { background: var(--plural); }
  .breakdown-chip.poss { background: var(--poss); }
  .breakdown-chip.case { background: var(--case); }
  .breakdown-desc {
    font-size: 13px;
    color: var(--ink);
    flex: 1;
    line-height: 1.4;
  }
  .breakdown-desc b {
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 1.2px;
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
  }

  .modal-btn {
    background: var(--ink);
    color: var(--bg);
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    padding: 14px 30px;
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: var(--shadow);
    width: 100%;
    text-transform: uppercase;
  }
  .modal-btn:active {
    transform: translateY(3px);
    box-shadow: none;
  }
  .modal-btn.secondary {
    background: var(--bg-alt);
    color: var(--ink);
    margin-top: 8px;
  }

  /* Menü ekranı */
  .menu-screen {
    text-align: center;
  }
  .menu-train {
    display: flex;
    justify-content: center;
    margin: 24px 0;
    gap: 0;
    align-items: flex-end;
    animation: floatTrain 3s ease-in-out infinite;
  }
  @keyframes floatTrain {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Learn screen */
  .learn-step {
    background: var(--panel);
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    text-align: left;
    box-shadow: var(--shadow);
  }
  .learn-step-num {
    display: inline-block;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--root);
    color: white;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    line-height: 28px;
    text-align: center;
    margin-bottom: 8px;
  }
  .learn-step h3 {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .learn-step p {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .mini-train {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 0;
    margin: 10px 0;
  }
  .mini-car {
    border: 2px solid var(--ink);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'Fraunces', serif;
    font-size: 11px;
    font-weight: 700;
    color: white;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .mini-car.root { background: var(--root); border-radius: 6px 12px 6px 6px; }
  .mini-car.plural { background: var(--plural); }
  .mini-car.poss { background: var(--poss); }
  .mini-car.case { background: var(--case); }

  .row-compare {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 10px 0;
    font-size: 13px;
  }
  .row-compare .lang-tag {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 50px;
  }
  .row-compare .lang-text {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 500;
  }
  .row-compare .lang-text .pieces {
    color: var(--root);
  }

  /* Confetti */
  #fxLayer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 500;
  }
  .confetti {
    position: absolute;
    width: 8px;
    height: 14px;
  }
  @keyframes confettiFall {
    0% { transform: translate(0, -50px) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--dx), 110vh) rotate(720deg); opacity: 0; }
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 22%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--ink);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    z-index: 400;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    border: 2px solid var(--bg);
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="container" id="app"></div>
<div id="fxLayer"></div>
<div class="toast" id="toast"></div>

<script>
// =====================================================
// İÇERİK - 15 puzzle (kademeli zorluk)
// =====================================================
const PUZZLES = [
  // ============================================
  // FAZ 1: TEKLI EK (1-9) - mekaniği öğret
  // ============================================
  // ÇOĞUL (1-3)
  {
    root: { text: 'çocuk', meaning: 'child' },
    target: { meaning: 'children', emoji: '👶' },
    suffixes: [{ id: 's1', text: 'lar', role: 'plural', desc: 'makes it plural' }],
    distractors: [
      { id: 'd1', text: 'ler', role: 'plural' },
      { id: 'd2', text: 'um', role: 'poss' },
    ],
  },
  {
    root: { text: 'kedi', meaning: 'cat' },
    target: { meaning: 'cats', emoji: '🐈' },
    suffixes: [{ id: 's1', text: 'ler', role: 'plural', desc: 'makes it plural' }],
    distractors: [
      { id: 'd1', text: 'lar', role: 'plural' },
      { id: 'd2', text: 'm', role: 'poss' },
    ],
  },
  {
    root: { text: 'ev', meaning: 'house' },
    target: { meaning: 'houses', emoji: '🏠' },
    suffixes: [{ id: 's1', text: 'ler', role: 'plural', desc: 'makes it plural' }],
    distractors: [
      { id: 'd1', text: 'lar', role: 'plural' },
      { id: 'd2', text: 'im', role: 'poss' },
    ],
  },

  // İYELİK / MY (4-6)
  {

function getAudioCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.log('Audio not supported');
      return null;
    }
  }
  // iOS Safari: ses ancak kullanıcı dokunduktan sonra çalışır
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

function playTone(freq, duration = 0.08, type = 'sine', volume = 0.15) {
  if (!state.soundOn) return;
  const ctx = getAudioCtx();
  if (!ctx) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

function playSequence(notes, gap = 0.08) {
  if (!state.soundOn) return;
  notes.forEach((note, i) => {
    setTimeout(() => {
      playTone(note.freq, note.duration || 0.1, note.type || 'sine', note.volume || 0.15);
    }, i * gap * 1000);
  });
}

// Ses türleri (sade, subtle)
const SOUNDS = {
  // Vagon bağlandı - sade tık (yüksek-orta nota)
  attach: () => playTone(660, 0.06, 'triangle', 0.12),
  // Yanlış - alçak kısa krrak
  wrong: () => playTone(180, 0.15, 'sawtooth', 0.10),
  // Yumuşama ✨ - hızlı yukarı kayan ton
  soften: () => {
    playSequence([
      { freq: 800, duration: 0.06, type: 'sine' },
      { freq: 1200, duration: 0.08, type: 'sine' },
    ], 0.05);
  },
  // Puzzle tamam - 3 nota yukarı (Do-Mi-Sol)
  complete: () => {
    playSequence([
      { freq: 523, duration: 0.1, type: 'triangle', volume: 0.15 },
      { freq: 659, duration: 0.1, type: 'triangle', volume: 0.15 },
      { freq: 784, duration: 0.18, type: 'triangle', volume: 0.18 },
    ], 0.1);
  },
  // Yıldız kazandı - kısa "ding"
  star: () => playTone(1320, 0.12, 'sine', 0.15),
  // Tüm oyun bitti - büyük başarı
  victory: () => {
    playSequence([
      { freq: 523, duration: 0.12, type: 'triangle' },
      { freq: 659, duration: 0.12, type: 'triangle' },
      { freq: 784, duration: 0.12, type: 'triangle' },
      { freq: 1047, duration: 0.3, type: 'triangle', volume: 0.18 },
    ], 0.13);
  },
};

function toggleSound() {
  state.soundOn = !state.soundOn;
  localStorage.setItem('tren-sound', state.soundOn ? 'on' : 'off');
  const btn = document.getElementById('soundBtn');
  if (btn) btn.textContent = state.soundOn ? '🔊' : '🔇';
  if (state.soundOn) SOUNDS.attach(); // ses açıldı, küçük geri bildirim
}

function getNextRole(puzzle) {
  // İnşa edilenlerin role'ları
  const builtRoles = state.built.map(s => s.role);
  // Hedeflenecek role sırası
  for (const role of ROLE_ORDER) {
    if (puzzle.suffixes.some(s => s.role === role) && !builtRoles.includes(role)) {
      return role;
    }
  }
  return null;
}

// =====================================================
// EVENT
// =====================================================
function attachListeners() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (state.isLocked) return;
      const action = el.dataset.action;
      handleAction(action, el);
    });
  });
}

function handleAction(action, el) {
  switch (action) {
    case 'start':
      startNewGame();
      break;
    case 'learn':
      state.screen = 'learn';
      render();
      break;
    case 'back-to-menu':
      state.screen = 'menu';
      render();
      break;
    case 'pick':
      pickSuffix(el.dataset.id);
      break;
    case 'next':
      nextPuzzle();
      break;
    case 'try-again':
      startNewGame();
      break;
  }
}

function startNewGame() {
  state = {
    screen: 'playing',
    currentPuzzle: 0,
    built: [],
    available: [],
    lives: 3,
    streak: 0,
    totalSolved: 0,
    isLocked: false,
  };
  loadPuzzle();
}

function loadPuzzle() {
  const puzzle = PUZZLES[state.currentPuzzle];
  state.built = [];
  const all = [...puzzle.suffixes, ...puzzle.distractors];
  state.available = shuffle(all);
  state.screen = 'playing';
  state.isLocked = false;
  render();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickSuffix(id) {
  const puzzle = PUZZLES[state.currentPuzzle];
  const suffix = state.available.find(s => s.id === id);
  if (!suffix) return;
  if (state.built.some(b => b.id === id)) return;

  const nextRole = getNextRole(puzzle);
  const isCorrect = suffix.role === nextRole && puzzle.suffixes.some(s => s.id === id);

  if (isCorrect) {
    const wasFirstSuffix = state.built.length === 0;
    state.built.push(suffix);
    SOUNDS.attach();
    render();

    // İlk ek eklenince yumuşama varsa parıltı + animasyon tetikle
    // ANCAK: ek ünlü ile başlamalı (çoğul -ler/-lar ile yumuşama olmaz)
    const isVowelStart = /^[aeıioöuü]/i.test(suffix.text);
    if (wasFirstSuffix && puzzle.softening && isVowelStart) {
      setTimeout(() => {
        triggerSoftening();
        SOUNDS.soften();
      }, 100);
    }

    if (state.built.length === puzzle.suffixes.length) {
      // Tamamlandı
      state.isLocked = true;
      state.streak++;
      state.totalSolved++;
      setTimeout(() => {
        if (state.currentPuzzle >= PUZZLES.length - 1) {
          state.screen = 'won';
          SOUNDS.victory();
        } else {
          state.screen = 'complete';
          SOUNDS.complete();
        }
        state.isLocked = false;
        render();
      }, 800);
    }
  } else {
    // Yanlış
    state.isLocked = true;
    state.lives--;
    state.streak = 0;
    SOUNDS.wrong();

    // Sallama
    const train = document.getElementById('train');
    if (train) {
      train.classList.add('shake');
      setTimeout(() => train.classList.remove('shake'), 400);
    }

    // Yanlış flash
    const btn = document.querySelector(`[data-id="${id}"]`);
    if (btn) {
      btn.classList.add('wrong-flash');
      setTimeout(() => btn.classList.remove('wrong-flash'), 400);
    }

    showToast(suffix.role === nextRole ? "Right type, wrong suffix" : `Need ${ROLE_LABEL[nextRole]} first`);

    setTimeout(() => {
      if (state.lives <= 0) {
        state.screen = 'gameover';
        state.isLocked = false;  // Modal butonları çalışsın
        render();
      } else {
        state.isLocked = false;
        render();
      }
    }, 500);
  }
}

function nextPuzzle() {
  state.currentPuzzle++;
  loadPuzzle();
}

function triggerSoftening() {
  // Lokomotifte parıltı animasyonu
  const locoCar = document.querySelector('.train-car');
  if (locoCar) {
    locoCar.classList.add('softened');
    // 4 yöne sparkle yıldızları
    const rect = locoCar.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const positions = [
      { dx: -30, dy: -20, emoji: '✨' },
      { dx: 30, dy: -25, emoji: '✨' },
      { dx: -20, dy: 25, emoji: '⭐' },
      { dx: 25, dy: 20, emoji: '✨' },
    ];
    positions.forEach((p, i) => {
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = p.emoji;
        s.style.position = 'fixed';
        s.style.left = cx + 'px';
        s.style.top = cy + 'px';
        s.style.setProperty('--dx', p.dx + 'px');
        s.style.setProperty('--dy', p.dy + 'px');
        document.getElementById('fxLayer').appendChild(s);
        setTimeout(() => s.remove(), 900);
      }, i * 80);
    });
  }
}

function launchConfetti(count = 40) {
  const colors = ['#d97742', '#a8324c', '#3a7ca5', '#7a9244', '#b8853a', '#2a1f1a'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.left = (window.innerWidth * 0.2 + Math.random() * window.innerWidth * 0.6) + 'px';
      c.style.top = '15vh';
      c.style.setProperty('--dx', (Math.random() * 300 - 150) + 'px');
      c.style.animation = `confettiFall ${1.5 + Math.random() * 1.5}s ease-in forwards`;
      c.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.getElementById('fxLayer').appendChild(c);
      setTimeout(() => c.remove(), 3500);
    }, i * 30);
  }
}

let toastTimer = null;
function showToast(msg, duration = 1400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// Başlat
// Test modu: ?test=33 → 33. puzzle'dan başla (1-indexli kullanıcı için)
const urlParams = new URLSearchParams(window.location.search);
const testStart = parseInt(urlParams.get('test'), 10);
if (!isNaN(testStart) && testStart >= 1 && testStart <= PUZZLES.length) {
  // 1-indexli kullanıcı parametresini 0-indexli array'e çevir
  state.currentPuzzle = testStart - 1;
  state.lives = 99; // Test sırasında ölmeyelim
  loadPuzzle();
} else {
  render();
}

// PWA Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(err => {
      console.log('SW registration failed:', err);
    });
  });
}
</script>
